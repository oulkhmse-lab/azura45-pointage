name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Update build timestamp
        run: |
          node -e "
          const fs = require('fs');
          const path = 'index.html';
          let content = fs.readFileSync(path, 'utf8');
          const timestamp = Date.now();
          content = content.replace(/<html/, '<html data-build=\"' + timestamp + '\"');
          fs.writeFileSync(path, content);
          console.log('✅ Build timestamp added: ' + timestamp);
          "
      - name: Deploy AZURA 45
        run: firebase deploy --only hosting:azura45 --token "$FIREBASE_TOKEN" --project azura45-pointage
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      - name: Deploy AZURA 46
        run: firebase deploy --only hosting:azura46 --token "$FIREBASE_TOKEN" --project azura45-pointage
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
